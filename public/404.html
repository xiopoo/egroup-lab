<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>页面不存在 | 灰金重组</title>
<meta name="description" content="灰金重组深耕中小企业困境诊断与重组赛道，提供企业诊断、陪跑顾问、重组顾问三大核心服务，帮助企业看清问题、重建秩序。">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Helvetica Neue',Arial,'PingFang SC','Hiragino Sans GB','Microsoft YaHei',sans-serif;background:#fff;color:#1a1a1a;line-height:1.8;font-size:15px;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale}
a{text-decoration:none;color:inherit;transition:color .2s ease}
img{max-width:100%;display:block;object-fit:contain}

:root{
  --brand:#AB1942;
  --text:#1a1a1a;
  --text-secondary:#4a4a4a;
  --text-muted:#8a8a8a;
  --text-faint:#b0b0b0;
  --border:#eee;
  --bg-gray:#fafafa;
  --content-max:680px;
  --content-padding:24px;
}

.container{max-width:var(--content-max);margin:0 auto;padding:0 var(--content-padding)}

/* Header */
.header{position:sticky;top:0;z-index:100;background:#fff;border-bottom:1px solid var(--border)}
.header-inner{max-width:var(--content-max);margin:0 auto;padding:0 var(--content-padding);height:56px;display:flex;align-items:center;justify-content:space-between}
.header-logo{display:flex;align-items:center}
.header-logo img{width:120px;height:auto;object-fit:contain}
.header-nav{display:flex;gap:24px;font-size:14px}
.header-nav a{color:var(--text-secondary);font-weight:400}
.header-nav a:hover{color:var(--brand)}
.header-nav a.active{color:var(--brand);font-weight:500}

/* 404 Main */
.error-page{padding:120px 0;text-align:center}
.error-code{font-size:96px;font-weight:800;color:var(--brand);line-height:1;margin-bottom:16px;letter-spacing:-.04em}
.error-title{font-size:28px;font-weight:600;color:var(--text);margin-bottom:12px;letter-spacing:-.01em}
.error-desc{font-size:15px;color:var(--text-secondary);line-height:1.8;margin-bottom:40px}
.btn-home{display:inline-block;padding:12px 28px;background:var(--brand);color:#fff;font-size:14px;font-weight:500;border-radius:6px;transition:opacity .2s ease}
.btn-home:hover{opacity:.85}

/* Footer */
.footer{padding:48px 0 40px;text-align:center;font-size:13px;color:var(--text-muted);border-top:1px solid var(--border)}
.footer p{margin-bottom:4px}
.footer a{color:var(--text-secondary)}
.footer a:hover{color:var(--brand)}

/* Responsive */
@media(max-width:767px){
  :root{--content-max:480px;--content-padding:20px}
  .error-page{padding:80px 0}
  .error-code{font-size:72px}
  .error-title{font-size:22px}
  .header-nav{gap:16px;font-size:13px}
}
</style>
</head>
<body>

<header class="header">
  <div class="header-inner">
    <a href="index.html" class="header-logo">
      <img src="images/logo-color.png" alt="灰金重组">
    </a>
    <nav class="header-nav">
      <a href="index.html">首页</a>
      <a href="about.html">关于</a>
      <a href="services.html">服务</a>
      <a href="cases.html">案例</a>
      <a href="diag.html">诊断</a>
    </nav>
  </div>
</header>

<main>
  <section class="error-page">
    <div class="container">
      <div class="error-code">404</div>
      <h1 class="error-title">页面不存在</h1>
      <p class="error-desc">您访问的页面可能已移除或地址有误</p>
      <a href="index.html" class="btn-home">返回首页 →</a>
    </div>
  </section>
</main>

<footer class="footer">
  <div class="container">
    <p>灰金重组整理</p>
    <p>联系 <a href="mailto:Lucasa@foxmail.com">Lucasa@foxmail.com</a></p>
  </div>
</footer>

</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>页面未找到 | 灰金重组</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background-color: #f8f9fa;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .brand-bg { background-color: #AB1942; }
        .text-white { color: #fff; }
        .text-center { text-align: center; }
        .mx-auto { margin-left: auto; margin-right: auto; }

        /* Header */
        .header {
            background-color: #AB1942;
            color: white;
            padding: 28px 16px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.12);
        }
        .header-inner {
            max-width: 480px;
            margin: 0 auto;
            text-align: center;
        }
        .header-logo {
            width: 64px;
            height: 64px;
            margin: 0 auto 12px;
            border-radius: 50%;
            background: rgba(255,255,255,0.15);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 12px;
        }
        .header-logo img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }
        .header h1 {
            font-size: 20px;
            font-weight: 700;
            letter-spacing: 1px;
        }
        .header .slogan {
            font-size: 13px;
            opacity: 0.8;
            margin-top: 4px;
        }

        /* Main */
        .main {
            flex: 1;
            max-width: 480px;
            margin: 0 auto;
            padding: 32px 16px;
            width: 100%;
        }

        /* 404 Card */
        .error-card {
            background: white;
            border-radius: 12px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
            padding: 40px 24px;
            text-align: center;
        }
        .error-code {
            font-size: 96px;
            font-weight: 800;
            color: #AB1942;
            line-height: 1;
            margin-bottom: 8px;
            letter-spacing: -4px;
        }
        .error-code .zero {
            color: #f3a5b0;
        }
        .error-title {
            font-size: 22px;
            font-weight: 700;
            color: #1f2937;
            margin-bottom: 12px;
        }
        .error-desc {
            font-size: 14px;
            color: #6b7280;
            line-height: 1.7;
            max-width: 320px;
            margin: 0 auto 28px;
        }
        .btn-home {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background-color: #AB1942;
            color: white;
            padding: 14px 32px;
            border-radius: 8px;
            font-weight: 600;
            font-size: 15px;
            text-decoration: none;
            transition: background-color 0.2s, transform 0.15s;
        }
        .btn-home:hover {
            background-color: #8c1435;
            transform: translateY(-1px);
        }
        .btn-home .arrow {
            font-size: 18px;
            line-height: 1;
        }

        /* Quick Links */
        .quick-links {
            margin-top: 20px;
        }
        .quick-links-title {
            font-size: 13px;
            color: #9ca3af;
            margin-bottom: 12px;
        }
        .quick-links-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }
        .quick-link {
            display: block;
            padding: 14px 12px;
            background: #f9fafb;
            border-radius: 8px;
            text-decoration: none;
            transition: background 0.2s;
        }
        .quick-link:hover {
            background: #f3f4f6;
        }
        .quick-link .icon {
            font-size: 20px;
            margin-bottom: 4px;
        }
        .quick-link .label {
            font-size: 13px;
            font-weight: 500;
            color: #1f2937;
        }
        .quick-link .desc {
            font-size: 11px;
            color: #9ca3af;
            margin-top: 2px;
        }

        /* Footer */
        .footer {
            text-align: center;
            padding: 24px 16px;
            font-size: 13px;
            color: #9ca3af;
            background-color: white;
            border-top: 1px solid #e5e7eb;
        }
        .footer .brand {
            color: #AB1942;
            font-weight: 600;
        }

        /* Responsive: Desktop */
        @media (min-width: 768px) {
            .header { padding: 36px 24px; }
            .header-inner { max-width: 768px; }
            .header-logo { width: 80px; height: 80px; padding: 16px; margin-bottom: 16px; }
            .header h1 { font-size: 28px; }
            .header .slogan { font-size: 15px; }
            .main { max-width: 768px; padding: 48px 24px; }
            .error-card { padding: 56px 40px; }
            .error-code { font-size: 128px; }
            .error-title { font-size: 26px; }
            .error-desc { font-size: 15px; max-width: 400px; }
            .quick-links-grid { grid-template-columns: repeat(4, 1fr); }
        }
    </style>
</head>
<body>

    <!-- Header -->
    <header class="header">
        <div class="header-inner">
            <div class="header-logo">
                <img src="logo.png" alt="灰金重组">
            </div>
            <h1>灰金重组</h1>
            <p class="slogan">看清问题，重建秩序</p>
        </div>
    </header>

    <!-- Main -->
    <main class="main">
        <div class="error-card">
            <div class="error-code">4<span class="zero">0</span>4</div>
            <h2 class="error-title">页面未找到</h2>
            <p class="error-desc">
                您访问的页面不存在或已被移除。<br>
                可能是链接已失效，或输入的地址有误。<br>
                请检查后重试，或返回首页继续浏览。
            </p>
            <a href="index.html" class="btn-home">
                <span class="arrow">←</span>
                <span>返回首页</span>
            </a>
        </div>

        <div class="quick-links">
            <p class="quick-links-title">您可能想了解</p>
            <div class="quick-links-grid">
                <a href="index.html#services" class="quick-link">
                    <div class="icon">📋</div>
                    <div class="label">核心服务</div>
                    <div class="desc">诊断 · 陪跑 · 重组</div>
                </a>
                <a href="index.html#cases" class="quick-link">
                    <div class="icon">📁</div>
                    <div class="label">成功案例</div>
                    <div class="desc">真实企业重生故事</div>
                </a>
                <a href="diag.html" class="quick-link">
                    <div class="icon">🔍</div>
                    <div class="label">免费体检</div>
                    <div class="desc">3分钟健康度扫描</div>
                </a>
                <a href="index.html#contact" class="quick-link">
                    <div class="icon">✉️</div>
                    <div class="label">联系我们</div>
                    <div class="desc">专家一对一咨询</div>
                </a>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="footer">
        <p><span class="brand">灰金重组</span> — 企业困境诊断与重组顾问</p>
        <p style="margin-top:4px">本文内容仅供参考，不构成法律意见或专业建议</p>
    </footer>

</body>
</html>

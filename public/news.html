<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{overflow-x:hidden;width:100%}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Helvetica Neue',Arial,'PingFang SC','Hiragino Sans GB','Microsoft YaHei',sans-serif;background:#fff;color:#1a1a1a;line-height:1.8;font-size:15px;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;-webkit-tap-highlight-color:transparent;touch-action:manipulation;overflow-x:hidden;width:100%}
a{text-decoration:none;color:inherit;transition:all .3s ease;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
img{max-width:100%;display:block;object-fit:contain;pointer-events:none}

:root{
  --brand:#AB1942;
  --brand-dark:#8B1435;
  --brand-light:#C42A52;
  --text:#1a1a1a;
  --text-secondary:#4a4a4a;
  --text-muted:#8a8a8a;
  --text-faint:#b0b0b0;
  --border:#e8e8e8;
  --border-light:#f0f0f0;
  --bg-gray:#f7f7f7;
  --bg-dark:#2a2a2a;
  --bg-darker:#1f1f1f;
  --content-max:1200px;
  --content-padding:24px;
  --radius-sm:6px;
  --radius-md:10px;
  --radius-lg:16px;
  --shadow-sm:0 2px 8px rgba(0,0,0,.04);
  --shadow-md:0 8px 24px rgba(0,0,0,.08);
  --shadow-lg:0 16px 48px rgba(0,0,0,.12);
  --transition:.3s ease;
}

.container{max-width:var(--content-max);margin:0 auto;padding:0 var(--content-padding)}

/* Header */
.header{position:sticky;top:0;z-index:100;background:var(--brand);box-shadow:0 2px 12px rgba(171,25,66,.15)}
.header-inner{max-width:var(--content-max);margin:0 auto;padding:0 var(--content-padding);height:64px;display:flex;align-items:center;justify-content:space-between}
.header-logo{display:flex;align-items:center;height:100%;padding:8px 12px}
.header-logo img{width:95px;height:auto;object-fit:contain;display:block}
.header-nav{display:flex;gap:32px;align-items:center}
.header-nav a{color:#fff;font-size:15px;font-weight:400;opacity:.9;position:relative}
.header-nav a:hover{opacity:1;color:#fff}
.header-nav a::after{content:'';position:absolute;bottom:-6px;left:0;width:0;height:2px;background:#fff;transition:width var(--transition);opacity:.8}
.header-nav a:hover::after{width:100%}
.header-nav a.active{opacity:1;font-weight:500}
.header-nav a.active::after{width:100%}
.nav-item-wrapper{display:inline-flex;align-items:center;gap:4px}
.nav-badge{font-size:10px;font-weight:600;background:#fff;color:#AB1942;padding:1px 5px;border-radius:8px;line-height:1.4;letter-spacing:.5px}

/* Page Hero */
.page-hero{background:linear-gradient(135deg,var(--brand) 0%,var(--brand-dark) 100%);position:relative;overflow:hidden;height:220px;display:flex;align-items:center}
.page-hero::before{content:'';position:absolute;top:-50%;right:-10%;width:500px;height:500px;background:radial-gradient(circle,rgba(255,255,255,.08) 0%,transparent 70%);border-radius:50%;pointer-events:none}
.page-hero-inner{position:relative;z-index:1;text-align:center;padding:60px 0}
.page-hero-title{font-size:42px;font-weight:700;color:#fff;letter-spacing:-.02em;line-height:1.2;margin-bottom:12px}
.page-hero-subtitle{font-size:18px;color:#fff;opacity:.85;font-weight:400}

/* News Filter Bar */
.filter-bar{background:#fff;border-bottom:1px solid var(--border);position:sticky;top:64px;z-index:50;padding:16px 0}
.filter-inner{max-width:var(--content-max);margin:0 auto;padding:0 var(--content-padding);display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap}
.filter-tabs{display:flex;gap:4px;flex-wrap:wrap}
.filter-tab{padding:8px 20px;border-radius:50px;font-size:14px;color:var(--text-secondary);cursor:pointer;transition:all var(--transition);border:none;background:none;white-space:nowrap;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
.filter-tab:hover{color:var(--brand);background:var(--brand-subtle)}
.filter-tab.active{background:var(--brand);color:#fff;font-weight:500}
.filter-search{position:relative}
.filter-search input{padding:8px 16px 8px 38px;border:1px solid var(--border);border-radius:50px;font-size:14px;outline:none;width:220px;transition:border-color var(--transition);color:var(--text)}
.filter-search input:focus{border-color:var(--brand)}
.filter-search input::placeholder{color:var(--text-faint)}
.filter-search-icon{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--text-muted);font-size:14px;pointer-events:none}

/* News Section */
.news-section{padding:60px 0}
.news-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:24px;margin-bottom:40px}
.news-card{background:#fff;border:1px solid var(--border-light);border-radius:var(--radius-md);overflow:hidden;transition:all var(--transition);box-shadow:var(--shadow-sm)}
.news-card:hover{transform:translateY(-6px);box-shadow:var(--shadow-md);border-color:var(--brand)}
.news-thumb{height:180px;position:relative;overflow:hidden;display:flex;align-items:center;justify-content:center}
.news-thumb-bg{width:100%;height:100%;position:relative;display:flex;align-items:center;justify-content:center}
.news-thumb-icon{font-size:48px;opacity:.3;color:#fff}
.news-category-tag{position:absolute;top:14px;left:14px;padding:4px 12px;background:rgba(255,255,255,.92);color:var(--brand);font-size:12px;font-weight:600;border-radius:20px;z-index:1}
.news-body{padding:24px 20px}
.news-title{font-size:17px;font-weight:600;color:var(--text);line-height:1.5;margin-bottom:10px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.news-title a{transition:color var(--transition)}
.news-title a:hover{color:var(--brand)}
.news-date{font-size:13px;color:var(--text-muted);margin-bottom:12px}
.news-summary{font-size:14px;color:var(--text-secondary);line-height:1.8;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}

/* Category colors */
.cat-company{background:linear-gradient(135deg,#AB1942 0%,#8B1435 100%)}
.cat-industry{background:linear-gradient(135deg,#2C7A7B 0%,#1A5C5D 100%)}
.cat-media{background:linear-gradient(135deg,#6B4FA9 0%,#4A3580 100%)}

/* Pagination */
.pagination{display:flex;align-items:center;justify-content:center;gap:8px;flex-wrap:wrap}
.page-btn{width:38px;height:38px;border:1px solid var(--border);border-radius:var(--radius-sm);display:flex;align-items:center;justify-content:center;font-size:14px;color:var(--text-secondary);cursor:pointer;transition:all var(--transition);background:#fff;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
.page-btn:hover{border-color:var(--brand);color:var(--brand)}
.page-btn.active{background:var(--brand);color:#fff;border-color:var(--brand);font-weight:500}
.page-btn:disabled{opacity:.4;cursor:default;pointer-events:none}
.page-nav{font-size:14px;color:var(--text-secondary);cursor:pointer;transition:color var(--transition);padding:8px 12px;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
.page-nav:hover{color:var(--brand)}
.page-nav:disabled{opacity:.4;cursor:default;pointer-events:none}

/* No results */
.no-results{text-align:center;padding:60px 0;color:var(--text-muted);font-size:16px}
.no-results-icon{font-size:48px;margin-bottom:16px;opacity:.4}

/* Empty state fallback for grid when all cards hidden */
.news-card.hidden{display:none}

/* Hamburger button */
.hamburger-btn{display:none;align-items:center;justify-content:center;width:44px;height:44px;background:none;border:none;cursor:pointer;flex-direction:column;gap:5px;padding:0;z-index:101;position:relative;-webkit-tap-highlight-color:transparent}
.hamburger-btn span{display:block;width:24px;height:2.5px;background:#fff;border-radius:2px;transition:all .3s ease;transform-origin:center;pointer-events:none}
.hamburger-btn.active span:nth-child(1){transform:translateY(7.5px) rotate(45deg)}
.hamburger-btn.active span:nth-child(2){opacity:0}
.hamburger-btn.active span:nth-child(3){transform:translateY(-7.5px) rotate(-45deg)}

/* Mobile nav overlay */
.mobile-nav-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.5);z-index:99;opacity:0;pointer-events:none;transition:opacity .3s ease}
.mobile-nav-overlay.active{opacity:1;pointer-events:auto}

/* Mobile nav panel */
.mobile-nav{position:fixed;top:0;right:0;width:75%;max-width:300px;height:100%;background:#AB1942;z-index:100;padding:80px 24px 24px;transform:translateX(100%);transition:transform .3s ease;overflow-y:auto}
.mobile-nav-overlay.active .mobile-nav{transform:translateX(0)}

/* Mobile nav links */
.mobile-nav a{display:block;color:#fff;font-size:17px;padding:14px 0;border-bottom:1px solid rgba(255,255,255,.12);font-weight:500;letter-spacing:.5px}
.mobile-nav a:last-child{border-bottom:none}
.mobile-nav a.active{opacity:1;font-weight:600}
.mobile-nav .nav-item-wrapper{display:block;padding:14px 0;border-bottom:1px solid rgba(255,255,255,.12)}
.mobile-nav .nav-item-wrapper a{display:inline;padding:0;border-bottom:none}
.mobile-nav .nav-badge{font-size:10px;font-weight:600;background:#fff;color:#AB1942;padding:1px 6px;border-radius:8px;line-height:1.4;letter-spacing:.5px;margin-left:6px}

/* Footer */
.footer{background:var(--bg-dark);color:#fff;padding:28px 0 16px}
.footer-inner{display:flex;align-items:center;justify-content:space-between;gap:24px;flex-wrap:wrap}
.footer-left{flex-shrink:0}
.footer-logo{width:55px;height:auto;filter:brightness(0) invert(1);opacity:.9;display:block}
.footer-right{display:flex;align-items:center;gap:24px;flex-wrap:wrap}
.footer-links{display:flex;gap:20px;flex-wrap:wrap}
.footer-links a{font-size:13px;color:var(--text-faint);text-decoration:none;transition:color var(--transition)}
.footer-links a:hover{color:#fff}
.footer-email{font-size:13px;color:var(--text-faint)}
.footer-email a{color:var(--text-faint);text-decoration:none}
.footer-email a:hover{color:#fff}
.footer-bottom{padding-top:14px;margin-top:14px;border-top:1px solid rgba(255,255,255,.08);text-align:center;font-size:11px;color:var(--text-muted)}

.news-thumb-img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;max-width:none;z-index:0}

/* Responsive */
        @media(max-width:1023px){
          .page-hero{height:200px}
          .page-hero-title{font-size:36px}
          .page-hero-subtitle{font-size:14px}
        }
@media(max-width:767px){
  :root{--content-padding:20px}

  .header-inner{height:56px}
  .header-logo img{width:80px;display:block}
  .header-nav{gap:18px}
  .header-nav a{font-size:13px}
  .header-nav{display:none}
  .hamburger-btn{display:flex}
  .nav-badge{font-size:9px;padding:0 4px}

  .page-hero{height:220px}
  .page-hero-title{font-size:32px}
  .page-hero-subtitle{font-size:15px}

  .filter-bar{top:56px}
  .filter-inner{flex-direction:column;align-items:stretch;gap:12px}
  .filter-tabs{justify-content:center}
  .filter-tab{padding:6px 16px;font-size:13px}
  .filter-search{width:100%}
  .filter-search input{width:100%}

  .news-section{padding:40px 0}
  .news-grid{grid-template-columns:1fr;gap:16px}
  .news-thumb{height:160px}
  .news-body{padding:20px 16px}
  .news-title{font-size:16px}

  .pagination{gap:4px}
  .page-btn{width:34px;height:34px;font-size:13px}
  .page-nav{font-size:13px;padding:6px 10px}

  .footer-inner{flex-direction:column;align-items:flex-start;gap:16px}
  .footer-right{flex-direction:column;align-items:flex-start;gap:12px}
  .footer-links{gap:14px}
}
main{overflow-x:hidden}
</style>

<script>
/* News Data */
var allNews = [
  { id:1, category:'公司动态', title:'灰金重组荣获2025年度企业服务创新奖', date:'2025-08-15', summary:'近日，灰金重组凭借在企业困境诊断与重组领域的专业服务，荣获2025年度企业服务创新奖...', catClass:'cat-company', catIcon:'🏆' },
  { id:2, category:'公司动态', title:'灰金重组与某大型律师事务所达成战略合作', date:'2025-07-22', summary:'为进一步提升企业重组服务的专业深度，灰金重组近日与某大型律师事务所签署战略合作协议...', catClass:'cat-company', catIcon:'🤝' },
  { id:3, category:'行业资讯', title:'2025年上半年企业破产重组案件同比增长15%', date:'2025-08-10', summary:'根据最新司法统计数据，2025年上半年全国企业破产重组案件数量较去年同期增长15%...', catClass:'cat-industry', catIcon:'📊' },
  { id:4, category:'行业资讯', title:'新公司法实施后，企业债务重组迎来新机遇', date:'2025-06-18', summary:'随着新公司法的正式实施，企业债务重组领域迎来了一系列制度性红利...', catClass:'cat-industry', catIcon:'📋' },
  { id:5, category:'媒体报道', title:'《财经》杂志：灰金重组创始人谈中小企业困境破局之道', date:'2025-07-30', summary:'《财经》杂志近日专访灰金重组联合创始人李景行...', catClass:'cat-media', catIcon:'🎙️' },
  { id:6, category:'媒体报道', title:'《经济观察报》：一家企业重组顾问的500天', date:'2025-05-12', summary:'《经济观察报》以长篇报道形式，记录了灰金重组团队陪伴某制造企业走出困境的500天历程...', catClass:'cat-media', catIcon:'📰' }
];
allNews.sort(function(a,b){return new Date(b.date)-new Date(a.date)});

var currentCategory = 'all';
var currentPage = 1;
var perPage = 6;
var searchQuery = '';

function getFilteredNews() {
  return allNews.filter(function(item) {
    if (currentCategory !== 'all' && item.category !== currentCategory) return false;
    if (searchQuery && item.title.indexOf(searchQuery) === -1 && item.summary.indexOf(searchQuery) === -1) return false;
    return true;
  });
}

function renderNewsList() {
  var grid = document.getElementById('news-grid');
  var pagination = document.getElementById('pagination');
  var filtered = getFilteredNews();
  var totalPages = Math.ceil(filtered.length / perPage);
  if (currentPage > totalPages) currentPage = Math.max(1, totalPages);

  var start = (currentPage - 1) * perPage;
  var pageItems = filtered.slice(start, start + perPage);

  if (pageItems.length === 0) {
    grid.innerHTML = '<div class="no-results"><div class="no-results-icon">📭</div><div>暂无相关新闻</div></div>';
  } else {
    var html = '';
    pageItems.forEach(function(item, idx) {
      html += '<div class="news-card">' +
        '<div class="news-thumb">' +
          '<div class="news-thumb-bg ' + item.catClass + '">' +
            '<img class="news-thumb-img" data-news="' + ((idx % 2) + 1) + '" alt="' + item.category + '">' +
            '<span class="news-thumb-icon">' + item.catIcon + '</span>' +
          '</div>' +
          '<span class="news-category-tag">' + item.category + '</span>' +
        '</div>' +
        '<div class="news-body">' +
          '<h3 class="news-title"><a href="news-detail.html?id=' + item.id + '">' + item.title + '</a></h3>' +
          '<div class="news-date">' + item.date + '</div>' +
          '<p class="news-summary">' + item.summary + '</p>' +
        '</div>' +
      '</div>';
    });
    grid.innerHTML = html;
  }

  // Render pagination
  if (totalPages <= 1) {
    pagination.innerHTML = '';
    return;
  }
  var phtml = '';
  phtml += '<button class="page-nav" ' + (currentPage <= 1 ? 'disabled' : '') + ' data-page="' + (currentPage - 1) + '">← 上一页</button>';
  for (var i = 1; i <= totalPages; i++) {
    phtml += '<button class="page-btn' + (i === currentPage ? ' active' : '') + '" data-page="' + i + '">' + i + '</button>';
  }
  phtml += '<button class="page-nav" ' + (currentPage >= totalPages ? 'disabled' : '') + ' data-page="' + (currentPage + 1) + '">下一页 →</button>';
  pagination.innerHTML = phtml;

  // Bind pagination clicks
  pagination.querySelectorAll('[data-page]').forEach(function(btn) {
    btn.addEventListener('click', function() {
      currentPage = parseInt(this.getAttribute('data-page'));
      renderNewsList();
      window.scrollTo({ top: document.querySelector('.news-section').offsetTop - 120, behavior: 'smooth' });
    });
  });
}

// Filter tab clicks
document.getElementById('filter-tabs').addEventListener('click', function(e) {
  if (!e.target.classList.contains('filter-tab')) return;
  var tabs = this.querySelectorAll('.filter-tab');
  tabs.forEach(function(t) { t.classList.remove('active'); });
  e.target.classList.add('active');
  currentCategory = e.target.getAttribute('data-category');
  currentPage = 1;
  renderNewsList();
});

// Search input
document.getElementById('search-input').addEventListener('input', function() {
  searchQuery = this.value.trim();
  currentPage = 1;
  renderNewsList();
});

// Mobile hamburger menu
(function(){var h=document.querySelector('.hamburger-btn'),o=document.querySelector('.mobile-nav-overlay');if(!h||!o)return;h.addEventListener('click',function(){this.classList.toggle('active');o.classList.toggle('active');document.body.style.overflow=o.classList.contains('active')?'hidden':''});o.addEventListener('click',function(e){if(e.target===this){this.classList.remove('active');h.classList.remove('active');document.body.style.overflow=''}});o.querySelectorAll('a').forEach(function(l){l.addEventListener('click',function(){o.classList.remove('active');h.classList.remove('active');document.body.style.overflow=''})})})();

// Initial render
renderNewsList();

// Image injection
(function(){
  var u = window.__IMAGE_URLS;
  if(!u) return;
  document.querySelectorAll('.news-thumb-img').forEach(function(img){
    var n = img.getAttribute('data-news');
    var key = 'news' + n;
    if(key && u[key]){ img.src = u[key]; }
  });
})();

// Image error handling
document.querySelectorAll('.news-thumb-img').forEach(function(img){
  img.addEventListener('error', function(){ this.style.display = 'none'; });
});
</script>
</body>
</html>

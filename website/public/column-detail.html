function copyArticleLink(){
  var url = window.location.href;

      alert('链接已复制到剪贴板');
    });
  } else {

    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    alert('链接已复制到剪贴板');
  }
}

/* Article data */
var articles = {
  1: {
    category: '债务重组',
    title: '中小企业债务重组的五个关键步骤',
    date: '2025-06-15',
    readtime: '约8分钟',
    imageText: '债务重组',
    tags: ['债务重组', '中小企业', '实操指南', '资金管理'],
    content: '<p>在当前经济环境下，中小企业的债务问题愈发突出。高杠杆经营、短贷长投、融资渠道单一等问题叠加，使得许多企业面临严峻的偿债压力。本文从实操角度出发，梳理了债务重组的五个关键步骤。</p>' +
      '<h2>第一步：全面债务清查</h2>' +
      '<p>债务重组的第一步，是对企业的债务状况进行全面、系统的清查。这包括：</p>' +
      '<ul>' +
      '<li><strong>明确债务总规模：</strong>梳理所有负债项目，包括银行贷款、民间借贷、供应商欠款、员工薪资、税费欠缴等。</li>' +
      '<li><strong>区分债务性质：</strong>将有息负债与无息负债、短期债务与长期债务、刚性债务与柔性债务进行分类。</li>' +
      '<li><strong>识别关键债权人：</strong>判断哪些债权人对企业经营具有决定性影响。</li>' +
      '<li><strong>评估担保情况：</strong>核查是否存在个人连带担保、资产抵押等情形，评估企业主个人的法律风险敞口。</li>' +
      '</ul>' +
      '<h2>第二步：现金流压力测试</h2>' +
      '<p>在完成债务清查后，需要进行详细的现金流压力测试，以判断企业在不同情境下的偿债能力。具体包括：</p>' +
      '<ul>' +
      '<li>编制未来12个月的现金流预测表</li>' +
      '<li>设定乐观、中性、悲观三种情景</li>' +
      '<li>计算各情景下的资金缺口</li>' +
      '<li>评估关键触发点（如贷款到期、大额应付到期等）</li>' +
      '</ul>' +
      '<h2>第三步：制定债务化解方案</h2>' +
      '<p>基于前两步的分析结果，制定差异化的债务化解方案。常见的策略包括：</p>' +
      '<ul>' +
      '<li><strong>以时间换空间：</strong>与债权人协商展期、降息，为企业争取恢复时间</li>' +
      '<li><strong>以资产换现金：</strong>处置低效资产、非核心资产，快速回笼资金</li>' +
      '<li><strong>以股权换债权：</strong>引入战略投资者，通过债转股降低负债率</li>' +
      '<li><strong>以增量激活存量：</strong>通过业务聚焦、成本优化释放现金流</li>' +
      '</ul>' +
      '<h2>第四步：与债权人展开谈判</h2>' +
      '<p>谈判是债务重组中最关键的环节，也是最考验专业能力的部分。谈判策略要点包括：</p>' +
      '<ul>' +
      '<li><strong>建立信任：</strong>主动、坦诚地向债权人披露企业真实状况</li>' +
      '<li><strong>统一立场：</strong>争取主要债权人的理解和支持</li>' +
      '<li><strong>方案打包：</strong>将债务化解方案打包呈现，而非逐项讨论</li>' +

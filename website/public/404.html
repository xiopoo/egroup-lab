<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{overflow-x:hidden;width:100%}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Helvetica Neue',Arial,'PingFang SC','Hiragino Sans GB','Microsoft YaHei',sans-serif;background:#fff;color:#1a1a1a;line-height:1.8;font-size:15px;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;-webkit-tap-highlight-color:transparent;touch-action:manipulation;overflow-x:hidden;width:100%}
a{text-decoration:none;color:inherit;transition:all .3s ease;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
img{max-width:100%;display:block;object-fit:contain;pointer-events:none}

:root{
  --brand:#AB1942;
  --brand-dark:#8B1435;
  --brand-light:#C42A52;
  --text:#1a1a1a;
  --text-secondary:#4a4a4a;
  --text-muted:#8a8a8a;
  --text-faint:#b0b0b0;
  --border:#e8e8e8;
  --border-light:#f0f0f0;
  --bg-gray:#f7f7f7;
  --bg-dark:#2a2a2a;
  --bg-darker:#1f1f1f;
  --content-max:1200px;
  --content-padding:24px;
  --radius-sm:6px;
  --radius-md:10px;
  --radius-lg:16px;
  --shadow-sm:0 2px 8px rgba(0,0,0,.04);
  --shadow-md:0 8px 24px rgba(0,0,0,.08);
  --shadow-lg:0 16px 48px rgba(0,0,0,.12);
  --transition:.3s ease;
}

.container{max-width:var(--content-max);margin:0 auto;padding:0 var(--content-padding)}

/* Header */
.header{position:sticky;top:0;z-index:100;background:var(--brand);box-shadow:0 2px 12px rgba(171,25,66,.15)}
.header-inner{max-width:var(--content-max);margin:0 auto;padding:0 var(--content-padding);height:64px;display:flex;align-items:center;justify-content:space-between}
.header-logo{display:flex;align-items:center;height:100%;padding:8px 12px}
.header-logo img{width:95px;height:auto;object-fit:contain;display:block}
.header-nav{display:flex;gap:32px;align-items:center}
.header-nav a{color:#fff;font-size:15px;font-weight:400;opacity:.9;position:relative}
.header-nav a:hover{opacity:1;color:#fff}
.header-nav a::after{content:'';position:absolute;bottom:-6px;left:0;width:0;height:2px;background:#fff;transition:width var(--transition);opacity:.8}
.header-nav a:hover::after{width:100%}
.header-nav a.active{opacity:1;font-weight:500}
.header-nav a.active::after{width:100%}
.nav-item-wrapper{display:inline-flex;align-items:center;gap:4px}
.nav-badge{font-size:10px;font-weight:600;background:#fff;color:#AB1942;padding:1px 5px;border-radius:8px;line-height:1.4;letter-spacing:.5px}

/* 404 Main */
.error-section{position:relative;overflow:hidden;background:var(--bg-gray)}
.error-section::before{content:'';position:absolute;top:20%;left:50%;transform:translateX(-50%);width:600px;height:600px;background:radial-gradient(circle,rgba(171,25,66,.08) 0%,transparent 70%);border-radius:50%;pointer-events:none}
.error-section::after{content:'';position:absolute;bottom:-1px;left:0;right:0;height:80px;background:#fff}
.error-inner{position:relative;min-height:calc(100vh - 64px - 300px);display:flex;align-items:center;justify-content:center;padding:100px 0 140px}
.error-content{text-align:center;position:relative;z-index:1}
.error-code{font-size:120px;font-weight:700;color:var(--brand);line-height:1;margin-bottom:20px;letter-spacing:-.04em;background:linear-gradient(135deg,var(--brand) 0%,var(--brand-dark) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.error-title{font-size:32px;font-weight:600;color:var(--text);margin-bottom:16px;letter-spacing:-.01em}
.error-desc{font-size:16px;color:var(--text-secondary);line-height:1.8;margin-bottom:48px;max-width:480px;margin-left:auto;margin-right:auto}
.error-actions{display:flex;gap:16px;justify-content:center;align-items:center;flex-wrap:wrap}
.btn-primary{display:inline-flex;align-items:center;gap:8px;padding:14px 36px;background:var(--brand);color:#fff;font-size:15px;font-weight:600;border-radius:50px;transition:all var(--transition);box-shadow:0 4px 16px rgba(171,25,66,.3);position:relative;z-index:2;cursor:pointer;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
.btn-primary:hover{background:var(--brand-light);transform:translateY(-2px);box-shadow:0 8px 24px rgba(171,25,66,.4)}
.btn-primary:active{transform:translateY(0)}
.btn-primary::after{content:'→';transition:transform var(--transition)}
.btn-primary:hover::after{transform:translateX(4px)}
.btn-secondary{display:inline-flex;align-items:center;gap:8px;padding:14px 36px;background:#fff;color:var(--brand);font-size:15px;font-weight:600;border-radius:50px;border:2px solid var(--brand);transition:all var(--transition);position:relative;z-index:2;cursor:pointer;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
.btn-secondary:hover{background:var(--brand);color:#fff;transform:translateY(-2px);box-shadow:0 8px 24px rgba(171,25,66,.3)}
.btn-secondary:active{transform:translateY(0)}

/* Footer */
.footer{background:var(--bg-dark);color:#fff;padding:28px 0 16px}
.footer-inner{display:flex;align-items:center;justify-content:space-between;gap:24px;flex-wrap:wrap}
.footer-left{flex-shrink:0}
.footer-logo{width:55px;height:auto;filter:brightness(0) invert(1);opacity:.9;display:block}
.footer-right{display:flex;align-items:center;gap:24px;flex-wrap:wrap}
.footer-links{display:flex;gap:20px;flex-wrap:wrap}
.footer-links a{font-size:13px;color:var(--text-faint);text-decoration:none;transition:color var(--transition)}
.footer-links a:hover{color:#fff}
.footer-email{font-size:13px;color:var(--text-faint)}
.footer-email a{color:var(--text-faint);text-decoration:none}
.footer-email a:hover{color:#fff}
.footer-bottom{padding-top:14px;margin-top:14px;border-top:1px solid rgba(255,255,255,.08);text-align:center;font-size:11px;color:var(--text-muted)}

/* Responsive */
        @media(max-width:1023px){
          .page-hero{height:200px}
          .page-hero-title{font-size:36px}
          .page-hero-subtitle{font-size:14px}
        }
/* Hamburger button */
.hamburger-btn{display:none;align-items:center;justify-content:center;width:44px;height:44px;background:none;border:none;cursor:pointer;flex-direction:column;gap:5px;padding:0;z-index:101;position:relative;-webkit-tap-highlight-color:transparent}
.hamburger-btn span{display:block;width:24px;height:2.5px;background:#fff;border-radius:2px;transition:all .3s ease;transform-origin:center;pointer-events:none}
.hamburger-btn.active span:nth-child(1){transform:translateY(7.5px) rotate(45deg)}
.hamburger-btn.active span:nth-child(2){opacity:0}
.hamburger-btn.active span:nth-child(3){transform:translateY(-7.5px) rotate(-45deg)}

/* Mobile nav overlay */
.mobile-nav-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.5);z-index:99;opacity:0;pointer-events:none;transition:opacity .3s ease}
.mobile-nav-overlay.active{opacity:1;pointer-events:auto}

/* Mobile nav panel */
.mobile-nav{position:fixed;top:0;right:0;width:75%;max-width:300px;height:100%;background:#AB1942;z-index:100;padding:80px 24px 24px;transform:translateX(100%);transition:transform .3s ease;overflow-y:auto}
.mobile-nav-overlay.active .mobile-nav{transform:translateX(0)}

/* Mobile nav links */
.mobile-nav a{display:block;color:#fff;font-size:17px;padding:14px 0;border-bottom:1px solid rgba(255,255,255,.12);font-weight:500;letter-spacing:.5px}
.mobile-nav a:last-child{border-bottom:none}
.mobile-nav a.active{opacity:1;font-weight:600}
.mobile-nav .nav-item-wrapper{display:block;padding:14px 0;border-bottom:1px solid rgba(255,255,255,.12)}
.mobile-nav .nav-item-wrapper a{display:inline;padding:0;border-bottom:none}
.mobile-nav .nav-badge{font-size:10px;font-weight:600;background:#fff;color:#AB1942;padding:1px 6px;border-radius:8px;line-height:1.4;letter-spacing:.5px;margin-left:6px}

@media(max-width:767px){
  :root{--content-padding:20px}
  
  .header-inner{height:56px}
  .header-logo img{width:80px;display:block}
  .header-nav{gap:18px}
  .header-nav a{font-size:13px}
  .nav-badge{font-size:9px;padding:0 4px}
  .header-nav{display:none}
  .hamburger-btn{display:flex}

  .error-inner{min-height:auto;padding:60px 0 100px}
  .error-code{font-size:80px;margin-bottom:16px}
  .error-title{font-size:24px}
  .error-desc{font-size:14px;margin-bottom:36px}
  .error-actions{flex-direction:column}
  .btn-primary,.btn-secondary{width:100%;justify-content:center;min-height:48px}
  
  .footer-inner{flex-direction:column;align-items:flex-start;gap:16px}
  .footer-right{flex-direction:column;align-items:flex-start;gap:12px}
  .footer-links{gap:14px}
}
main{overflow-x:hidden}
</style>

<script>

(function(){var h=document.querySelector('.hamburger-btn'),o=document.querySelector('.mobile-nav-overlay');if(!h||!o)return;h.addEventListener('click',function(){this.classList.toggle('active');o.classList.toggle('active');document.body.style.overflow=o.classList.contains('active')?'hidden':''});o.addEventListener('click',function(e){if(e.target===this){this.classList.remove('active');h.classList.remove('active');document.body.style.overflow=''}});o.querySelectorAll('a').forEach(function(l){l.addEventListener('click',function(){o.classList.remove('active');h.classList.remove('active');document.body.style.overflow=''})})})();
